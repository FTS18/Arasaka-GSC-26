<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Janrakshak | Offline Mode</title>
    <style>
        :root {
            --bone: #F0EDE4;
            --ink: #111111;
            --signal-red: #E63946;
        }
        body {
            background: var(--bone);
            color: var(--ink);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .card {
            border: 4px solid var(--ink);
            padding: 40px;
            max-width: 500px;
            background: white;
            box-shadow: 12px 12px 0px var(--ink);
        }
        h1 {
            font-size: 3rem;
            margin: 0 0 10px 0;
            letter-spacing: -2px;
            text-transform: uppercase;
        }
        .status {
            background: var(--signal-red);
            color: white;
            display: inline-block;
            padding: 4px 12px;
            font-weight: 900;
            font-size: 0.8rem;
            margin-bottom: 20px;
        }
        p {
            line-height: 1.6;
            font-weight: 500;
        }
        .retry-btn {
            margin-top: 30px;
            background: var(--ink);
            color: var(--bone);
            border: none;
            padding: 15px 30px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .retry-btn:active {
            transform: translateY(2px);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="status">CONNECTION INTERRUPTED</div>
        <h1>OFFLINE</h1>
        <p>Janrakshak has detected a loss of tactical connectivity. You are currently viewing cached data. New reports will be queued locally and synced automatically when back online.</p>
        <button class="retry-btn" onclick="window.location.reload()">Re-establish Link</button>
    </div>
</body>
</html>
